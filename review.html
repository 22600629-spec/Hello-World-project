<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review</title>

<style>

body {
    background-color: #f0e1e1;
    font-family: "Pretendard", sans-serif;
    min-height: 100vh;
    margin: 0;
}

/* ===== Header ===== */

header {
    background-color: #d8b6b6;
    height: 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    position: relative;
}

.nav {
    display: flex;
    gap: 30px;
    padding-left: 20px;
}

.nav a {
    text-decoration: none;
    color: #555;
    font-size: 14px;
    font-weight: 600;
    margin-right: 18px;
}

.nav a:hover {
    color: #000;
}


header h1 {
    position: absolute;
    left: 50%;
    top: 50%;

    transform: translate(-50%, -50%);

    margin: 0;

    font-size: 24px;
    letter-spacing: 2px;
}

/* ===== Main Container ===== */

.container {
    width: 80%;
    max-width: 1100px;
    min-height: 580px;

    margin: 30px auto;

    background: #f9f1eb;
    border-radius: 25px;

    padding: 40px;

    box-sizing: border-box;
}

/* ===== Review Section ===== */

.review-content {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

.review-box {
    width: 62%;
}

.review-box h3 {
    margin-bottom: 15px;
    font-size: 26px;
}

textarea {
    width: 100%;
    height: 200px;

    padding: 15px;

    resize: none;

    box-sizing: border-box;

    border: 1px solid #999;

    font-family: inherit;
    font-size: 16px;
    line-height: 1.6;
}

textarea::placeholder {
    font-size: 16px;
}

.section {
    margin-top: 30px;
}

.section strong {
    font-size: 18px;
}

.radio-group {
    margin-top: 15px;
}

.radio-group label {
    margin-right: 25px;
    font-size: 16px;
}

/* ===== Submit Button ===== */

.submit-btn {
    display: block;

    margin: 40px auto 0;

    padding: 8px 22px;

    border: 1px solid #999;
    background: white;

    font-size: 15px;
    cursor: pointer;
}

.submit-btn:hover {
    background: #f0f0f0;
}

/* ===== Right Image ===== */

.side-image {
    width: 32%;
    text-align: center;
}

.side-image img {
    width: 250px;
    height: 320px;

    object-fit: cover;

    max-width: 100%;

    border-radius: 12px;
}

.side-image p {
    margin-top: 15px;

    color: #8a7b7b;

    font-size: 15px;
    line-height: 1.6;
}

/* ===== Responsive ===== */

@media (max-width: 900px) {

    .review-content {
        flex-direction: column;
        align-items: center;
    }

    .review-box {
        width: 100%;
    }

    .side-image {
        width: 100%;
        margin-top: 40px;
    }

    .side-image img {
        width: 230px;
        height: 300px;
    }

    .nav h1 {
        font-size: 18px;
    }
}

</style>
</head>

<body>

<header>
    <nav class="nav">
        <a href="index.html">HOME</a>
        <a href="review.html">REVIEW</a>
        <a href="#">LETTER</a>
        <h1>PRESENT FOR YOU !!</h1>
    </nav>
</header>

<main class="container">

    <div class="review-content">

        <div class="review-box">

            <h3>Your Message</h3>

            <textarea placeholder="Please write your review here."></textarea>

            <div class="section">
                <strong>Type</strong>

                <div class="radio-group">
                    <label><input type="radio" name="type"> Bug</label>
                    <label><input type="radio" name="type"> Idea</label>
                    <label><input type="radio" name="type"> Etc</label>
                </div>
            </div>

            <div class="section">
                <strong>Rating</strong>

                <div class="radio-group">
                    <label><input type="radio" name="rating"> Good</label>
                    <label><input type="radio" name="rating"> Soso</label>
                    <label><input type="radio" name="rating"> Bad</label>
                </div>
            </div>

            <button class="submit-btn">Submit</button>

        </div>

        <div class="side-image">

            <img src="flower-letter.png.png" alt="flower">

            <p>
                Thank you for your feedback.<br>
                Your opinion means a lot to us.
            </p>

        </div>

    </div>

</main>

</body>
</html>
