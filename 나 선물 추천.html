<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>

      body {
        background-color: #f5dede;
        font-family:"pretendard", sans-serif;
        min-height: 100vh;
        margin: 0;
      }

      header {
        background-color: #d8b6b6;
        height: 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        position: relative;
      }

      nav a {
        text-decoration: none;
        color: #333;
        font-size: 14px;
        font-weight: 600;
        margin-right: 18px;
      }

      header h1 {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        letter-spacing: 2px;
    
      }

      .container {
        width: 1200px;
        min-height: 700px;
        margin: 40px auto;
        background: #f9f1eb;
        border-radius: 25px;
        padding: 40px;
      }

      .title-box {
        max-width: 320px;
        width: 320px;
        height: 60px;
        margin: 0 auto 40px;
        border: 3px solid #888;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
      }

      .nav {
        display: flex;
        gap: 30px;
        padding-left: 20px
      }
      .nav a {
        color: #555;
        text-decoration: none;
      }
      .nav a:hover {
        color: #000;
      }

      .vending-machine {
        position: relative;
        margin-left: 20px;
      }

      .vending-machine img{
        width: 100%;
        max-width: 1000px;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      .product-box {
        position: absolute;
        top: 7%;
        left: 23%;
        width: 550px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0);
        padding: 10px 12px;
      }

      .product-box img {
        max-width: 120px;
        height: auto;
        display: block;
      }

      .product-description {
        font-size: 15px;
        line-height: 1.5;
        color: #333;
        max-width: 400px;
      }

    </style>
  </head>

  <body>
    <header>
      <nav class="nav">
        <a href="#">HOME</a>
        <a href="#">REVIEW</a>
        <a href="#">LETTER</a>
      </nav>

      <h1>PRESENT FOR YOU !!</h1>
    </header>

    <main class="container">
      <div class="title-box">PRESENT FOR YOU !!</div>

      <section class="vending-machine">
        <!-- 자판기 이미지 -->
        <img src="추천페이지 자판기.png" alt="자판기" align="center"/>

        <div class="product-box" style="top: 7%; left:23%;">
          <a href="https://www.idus.com/v2/product/8d3110b8-c57a-4c46-ac61-58930f8220f2?search_word=%EC%9B%90%EB%8D%B0%EC%9D%B4+%ED%81%B4%EB%9E%98%EC%8A%A4&keyword_channel=user" target="_blank" rel="noopener noreferrer">
            <img src="원데이 클래스.jpg" alt="원데이 클래스" />
          </a>
          <div class="product-description">
            <p><strong>원데이 클래스</strong></p>
            <p>재미있는 원데이 클래스로 특별한 시간을 보내보세요.</p>
          </div>
        </div>

        <div class="product-box" style="top: 20%; left:23%;">
          <a href="https://www.idus.com/v2/product/1626d8fc-3786-4735-933a-5af0d22034ec?search_word=%EB%8B%A4%EC%9D%B4%EC%96%B4%EB%A6%AC&keyword_channel=user" target="_blank" rel="noopener noreferrer">
            <img src="다이어리.jpg" alt="다이어리" />
          </a>
          <div class="product-description">
            <p><strong>다이어리</strong></p>
            <p>예쁜 디자인의 다이어리로 일상을 기록해보세요.</p>
          </div>
        </div>

        <div class="product-box" style="top: 32%; left:23%;">
          <a href="https://www.idus.com/v2/product/0384a7ac-75ad-4dea-87cf-6f609ea1f965?search_word=%ED%96%A5%EC%88%98&keyword_channel=user" target="_blank" rel="noopener noreferrer">
            <img src="향수.jpg" alt="향수" />
          </a>
          <div class="product-description">
            <p><strong>향수</strong></p>
            <p>아름다운 향기로 당신을 감싸줍니다.</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
