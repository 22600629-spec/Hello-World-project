<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>

      body {
        background-color: #f5dede;
        font-family:"pretendard", sans-serif;
        min-height: 100vh;
        margin: 0;
      }

      header {
        background-color: #d8b6b6;
        height: 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        position: relative;
      }

      nav a {
        text-decoration: none;
        color: #333;
        font-size: 14px;
        font-weight: 600;
        margin-right: 18px;
      }

      header h1 {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        letter-spacing: 2px;
    
      }

      .container {
        width: 90%;
        max-width: 1200px;
        min-height: 700px;
        margin: 40px auto;
        background: #f9f1eb;
        border-radius: 25px;
        padding: 40px;
      }

      .title-box {
        max-width: 320px;
        width: min(90%, 320px);
        height: 60px;
        margin: 0 auto 40px;
        border: 3px solid #888;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
      }

      .nav {
        display: flex;
        gap: 30px;
        padding-left: 20px
      }
      .nav a {
        color: #555;
        text-decoration: none;
      }
      .nav a:hover {
        color: #000;
      }

      .vending-machine {
        position: relative;
      }

      .vending-machine img{
        max-width: 100%;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      .product-box {
        position: absolute;
        top: 7%;
        left: 23%;
        width: 550px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0);
        padding: 10px 12px;
      }

      .product-box img {
        max-width: 120px;
        height: auto;
        display: block;
      }

      .product-description {
        font-size: 15px;
        line-height: 1.5;
        color: #333;
        max-width: 400px;
      }

      /* 반응형: 작은 화면에서 레이아웃 축소 */
      @media (max-width: 900px){
        header {padding: 0 20px;}
        nav a{font-size:13px;margin-right:12px}
        .nav { gap: 10px; }
        header h1{font-size:18px}
        .container{padding:24px}
      }

      @media (max-width: 600px){
        header{height:auto; padding:12px 16px; align-items:flex-start}
        header h1{position:static; transform:none; text-align:center; width:100%; margin:8px 0}
        .nav{flex-wrap:wrap; gap:8px}
        .title-box{height:56px; font-size:18px}
        .container{margin:20px auto; padding:16px}
      }
    </style>
  </head>

  <body>
    <header>
      <nav class="nav">
        <a href="#">HOME</a>
        <a href="#">REVIEW</a>
        <a href="#">LETTER</a>
      </nav>

      <h1>PRESENT FOR YOU !!</h1>
    </header>

    <main class="container">
      <div class="title-box">PRESENT FOR YOU !!</div>

      <section class="vending-machine">
        <!-- 자판기 이미지 -->
        <img src="추천페이지 자판기.png" alt="자판기" align="center"/>

        <div class="product-box" style="top: 7%; left:23%;">
          <a href="https://www.idus.com/v2/product/ff2fec5e-c8d0-49c6-b5a9-320f430a36db">
            <img src="플라워 용돈 박스.jpg" alt="플라워 용돈 박스" />
          </a>
          <div class="product-description">
            <p><strong>플라워 용돈 박스</strong></p>
            <p>예쁜 꽃 디자인의 용돈 박스입니다. 특별한 선물로 완벽합니다.</p>
          </div>
        </div>

        <div class="product-box" style="top: 20%; left:23%;">
          <a href="https://www.idus.com/v2/product/3cbc2181-f7bd-4ced-a664-d424391b89a9?search_word=%EC%86%8C%EA%B3%A0%EA%B8%B0&keyword_channel=auto" target="_blank">
            <img src="소고기.jpg" alt="소고기 선물" />
          </a>
          <div class="product-description">
            <p><strong>1+한우 모둠 선물세트</strong></p>
            <p>맛있는 한우 모둠으로 구성된 선물세트입니다.</p>
          </div>
        </div>

        <div class="product-box" style="top: 32%; left:23%;">
          <a href="https://www.idus.com/v2/product/d003aa5b-fa90-4426-b0d6-e13b91aedcc8?search_word=%ED%99%8D%EC%82%BC%EC%84%B8%ED%8A%B8&keyword_channel=user" target="_blank" rel="noopener noreferrer">
            <img src="홍삼세트.jpg" alt="홍삼세트" />
          </a>
          <div class="product-description">
            <p><strong>홍삼 세트</strong></p>
            <p>건강에 좋은 홍삼으로 구성된 선물세트입니다.</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
