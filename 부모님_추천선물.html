<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부모님_선물추천</title>
    <style>

      body {
        background-color: #f5dede;
        font-family:"pretendard", sans-serif;
        min-height: 100vh;
        margin: 0;
      }

      header {
        background-color: #d8b6b6;
        height: 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        position: relative;
      }

      nav a {
        text-decoration: none;
        color: #333;
        font-size: 14px;
        font-weight: 600;
        margin-right: 18px;
      }

      header h1 {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        letter-spacing: 2px;
    
      }

      .container {
        width: 1200px;
        min-height: 700px;
        margin: 40px auto;
        background: #f9f1eb;
        border-radius: 25px;
        padding: 40px;
      }

      .title-box {
        max-width: 320px;
        width: 320px;
        height: 60px;
        margin: 0 auto 40px;
        border: 3px solid #888;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
      }

      .nav {
        display: flex;
        gap: 30px;
        padding-left: 20px
      }
      .nav a {
        color: #555;
        text-decoration: none;
      }
      .nav a:hover {
        color: #000;
      }

      .vending-machine {
        position: relative;
        margin-left: 20px;
      }

      .vending-machine img{
        width: 100%;
        max-width: 1000px;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      .product-box {
        position: absolute;
        top: 7%;
        left: 23%;
        width: 550px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0);
        padding: 10px 12px;
      }

      .product-box img {
        max-width: 120px;
        height: auto;
        display: block;
      }

      .product-description {
        border-radius: 10px;
        font-size: 12px;
        line-height: 1.5;
        color: #333;
        width: 450px;
        height: 100px;
        padding: 10px;
        background-color: rgba(255, 255, 255, 0.75); 
        margin-bottom: 10px;
      }

    </style>
  </head>

  <body>
    <header>
      <nav class="nav">

</html>
