<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>

      body {
        background-color: #f5dede;
        font-family:"pretendard", sans-serif;
        min-height: 100vh;
        margin: 0;
      }

      header {
        background-color: #d8b6b6;
        height: 60px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0 30px;
        position: relative;
      }

      nav a {
        text-decoration: none;
        color: #333;
        font-size: 14px;
        font-weight: 600;
        margin-right: 18px;
      }

      header h1 {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        letter-spacing: 2px;
    
      }

      .container {
        width: 1200px;
        min-height: 700px;
        margin: 40px auto;
        background: #f9f1eb;
        border-radius: 25px;
        padding: 40px;
      }

      .title-box {
        max-width: 320px;
        width: 320px;
        height: 60px;
        margin: 0 auto 40px;
        border: 3px solid #888;
        background: white;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: bold;
      }

      .nav {
        display: flex;
        gap: 30px;
        padding-left: 20px
      }
      .nav a {
        color: #555;
        text-decoration: none;
      }
      .nav a:hover {
        color: #000;
      }

      .vending-machine {
        position: relative;
        margin-left: 20px;
      }

      .vending-machine img{
        width: 100%;
        max-width: 1000px;
        height: auto;
        display: block;
        margin: 0 auto;
      }

      .product-box {
        position: absolute;
        top: 7%;
        left: 23%;
        width: 550px;
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(255, 255, 255, 0);
        padding: 10px 12px;
      }

      .product-box img {
        max-width: 120px;
        height: auto;
        display: block;
      }

      .product-description {
        font-size: 15px;
        line-height: 1.5;
        color: #333;
        max-width: 400px;
      }

    </style>
  </head>

  <body>
    <header>
      <nav class="nav">
        <a href="#">HOME</a>
        <a href="#">REVIEW</a>
        <a href="#">LETTER</a>
      </nav>

      <h1>PRESENT FOR YOU !!</h1>
    </header>

    <main class="container">
      <div class="title-box">PRESENT FOR YOU !!</div>

      <section class="vending-machine">
        <!-- 자판기 이미지 -->
        <img src="자판기.png" alt="자판기" align="center"/>

        <div class="product-box" style="top: 7%; left:23%;">
          <a href="https://soltice.kr/product/detail.html?product_no=38&utm_source=google&utm_medium=catalog&utm_campaign=cafe24_cmc&utm_content=product_38&gad_source=4&gad_campaignid=23050083500&gbraid=0AAAAAqOQMYkx5a3uvg8WHDbxsbdNNn3A8&gclid=Cj0KCQjwio_RBhDMARIsAJPveNNjfkS5r4AKFKMA_vxWI-hhdvEHwEV_fXb7yYhvocrfguvfdVGACvsaAkNnEALw_wcB"">
            <img src="비타민.png" alt="비타민" />
          </a>
          <div class="product-description">
            <p><strong>비타민</strong></p>
            <p>건강한 일상을 돕는 비타민입니다. 바쁜 새섬에게 활력을 주는
              실용적인 선물입니다.</p>
          </div>
        </div>

        <div class="product-box" style="top: 20%; left:23%;">
          <a href="https://www.e-himart.co.kr/app/goods/goodsDetail?goodsNo=0017770027&utm_source=google&utm_medium=pc_shopping&utm_campaign=google_sp&fromShop=google_sp" target="_blank" rel="noopener noreferrer">
            <img src="카메라.png" alt="카메라" />
          </a>
          <div class="product-description">
            <p><strong>카메라</strong></p>
            <p>
              사진을 찍어 추억을 기록할 수 있는 카메라입니다. 새섬의 추억을
              남기는 데 도움이 되는 선물입니다.
            </p>
          </div>
        </div>

          </div>
        </div>

        <div class="product-box" style="top: 32%; left:23%;">
          <a href="https://www.gramercyflower.com/flower_1/?idx=170" target="_blank" rel="noopener noreferrer">
            <img src="꽃다발.png" alt="꽃다발" />
          </a>
          <div class="product-description">
            <p><strong>꽃다발</strong></p>
            <p>
              아름다운 꽃다발은 기분을 좋게 하고, 평범한 날도 특별하게 만드는
              선물입니다. 새섬에게 따뜻한 마음을 전하는 선물입니다.
            </p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
