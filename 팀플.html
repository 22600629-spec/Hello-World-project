<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        background-color: #f5dede;
        font-family: "pretendard", sans-serif;
        min-height: 100vh;
      }

      header {
        background-color: #d8b6b6;
        height: 60px;

        display: flex;
        justify-content: space-between;
        align-items: center;

        padding: 0 30px;
      }

      nav a {
        text-decoration: none;
        color: #333;
        font-size: 14px;
        font-weight: 600;
      }

      header h1 {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        font-size: 24px;
        letter-spacing: 2px;
      }

      .container {
        width: 1200px;
        min-height: 700px;

        margin: 40px auto;

        background: #f9f1eb;

        border-radius: 25px;

        padding: 40px;
      }

      .title-box {
        width: 320px;
        height: 60px;

        margin: 0 auto 40px;

        border: 3px solid #888;

        background: white;

        display: flex;
        justify-content: center;
        align-items: center;

        font-size: 24px;
        font-weight: bold;
      }

      .nav {
        display: flex;
        gap: 30px;
        padding-left: 20px;
      }
      .nav a {
        color: #555;
        text-decoration: none;
      }
      .nav a:hover {
        color: #000;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="nav">
        <a href="#">HOME</a>
        <a href="#">REVIEW</a>
        <a href="#">LETTER</a>
      </nav>

      <h1>PRESENT FOR YOU !!</h1>
    </header>

    <main class="container">
      <div class="title-box">PRESENT FOR YOU !!</div>

      <section class="vending-machine">
        <!-- 자판기 이미지 -->
        <img src="자판기.png" alt="자판기" align="center"/>
      </section>
    </main>
  </body>
</html>
